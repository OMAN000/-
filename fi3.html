<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إنارة الشوارع الذكي - تحميل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body {
            background: linear-gradient(145deg, #f0f5fa, #d9e4ee);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 70px;
            padding: 3.5rem 3rem;
            box-shadow: 0 30px 60px rgba(0, 50, 70, 0.2);
            border: 3px solid #ffb347;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            color: #126b7e;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        h1 i { color: #ffb347; }
        .subhead {
            font-size: 1.4rem;
            color: #1f7a8c;
            margin-bottom: 3rem;
            border-bottom: 2px solid #ffd966;
            padding-bottom: 1rem;
            display: inline-block;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin: 2.5rem 0;
        }
        .btn {
            background: #126b7e;
            color: white;
            border: none;
            border-radius: 80px;
            padding: 22px 45px;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 12px 0 #0a4a5a;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 20px;
            border: 4px solid white;
            text-decoration: none;
        }
        .btn:active { transform: translateY(8px); box-shadow: 0 4px 0 #0a4a5a; }
        .btn-pkt {
            background: #ffb347;
            color: #05445e;
            box-shadow: 0 12px 0 #d18d2c;
        }
        .btn i { font-size: 2.2rem; }
        .footer-note {
            margin-top: 3rem;
            color: #126b7e;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-lightbulb"></i> نظام إنارة الشوارع الذكي</h1>
        <div class="subhead">المشروع الثاني – محاكاة Cisco Packet Tracer</div>

        <div class="button-group">
            <a href="https://drive.google.com/uc?export=download&id=1mKbFyaZkWdFm6CLiXh8JFB00z1ghtal7" 
               class="btn btn-pkt">
               <i class="fas fa-file-archive"></i> تحميل ملف المحاكاة (.pkt)
            </a>

            <a href="explanation.html" class="btn">
                <i class="fas fa-file-pdf"></i> عرض الشرح الكامل
            </a>
        </div>

        <div class="footer-note">
            <i class="fas fa-copyright"></i> إعداد: حامد خالد الناصري – 2026
        </div>
    </div>
</body>
</html>
